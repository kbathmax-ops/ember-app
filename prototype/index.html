<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ember — Smoke Alert</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; overflow: hidden; }
    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #F6F4F0;
      color: #111111;
      -webkit-font-smoothing: antialiased;
    }
    button { font-family: inherit; }
    input, select { font-family: inherit; }

    @keyframes sparkline-in {
      from { clip-path: inset(0 100% 0 0); }
      to   { clip-path: inset(0 0% 0 0); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(16px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @keyframes pulse-badge {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.35; }
    }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #E4E1DB; border-radius: 2px; }

    input[type=range] { -webkit-appearance: none; appearance: none; background: transparent; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 0; height: 0; }

    .screen-wrap {
      height: 100%;
      width: 100%;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="ember-ui.jsx"></script>
  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [screen, setScreen] = useState('landing');

      const go = (s) => {
        const map = { home: 'home', alert: 'alert', air: 'home', profile: 'profile', settings: 'profile', landing: 'landing' };
        setScreen(map[s] || s);
      };

      return (
        <div style={{ height: '100%', width: '100%', overflow: 'hidden', position: 'relative' }}>
          {screen === 'onboarding' && <Screen1 onDone={() => setScreen('home')} />}
          {screen === 'home'       && <Screen2 active="home"    onChange={go} />}
          {screen === 'alert'      && <Screen3 active="alert"   onChange={go} />}
          {screen === 'profile'    && <Screen4 active="profile" onChange={go} />}
          {screen === 'landing'    && <Screen5 onChange={go} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
